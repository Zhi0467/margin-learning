name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: brew install librsvg
      - run: npm test
      - run: npm run package
      - run: npm run verify:package
      - uses: actions/upload-artifact@v7
        with:
          name: margin-macos-arm64
          path: |
            dist/Margin-*-macos-arm64.zip
            dist/SHA256SUMS
